name: Publish Models to HuggingFace

on:
  push:
    tags: ['model-v*']
  workflow_dispatch:

env:
  HF_MODEL_REPO: ${{ vars.HF_USERNAME }}/role-radar-scoring
  HF_DATASET_REPO: ${{ vars.HF_USERNAME }}/role-radar-dataset

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install HuggingFace CLI
        run: pip install "huggingface_hub[cli]"

      - name: Verify ONNX models exist
        run: |
          test -f model-training/data/models/onnx/skills_lgbm.onnx || \
            { echo "ERROR: Run 'python3 export_onnx.py' locally before tagging"; exit 1; }

      - name: Publish models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf auth login --token $HF_TOKEN --add-to-git-credential
          hf upload $HF_MODEL_REPO model-training/data/models/onnx/ . \
            --repo-type model \
            --commit-message "$(git describe --tags)"
          hf upload $HF_MODEL_REPO model-training/hf-model-card.md README.md \
            --repo-type model

      - name: Publish dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload $HF_DATASET_REPO model-training/data/ . \
            --repo-type dataset \
            --include "*.json" \
            --commit-message "$(git describe --tags)"
          hf upload $HF_DATASET_REPO model-training/hf-dataset-card.md README.md \
            --repo-type dataset
